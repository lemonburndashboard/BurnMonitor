<svg width="100%" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Lemon Chain hacker favicon</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A dark terminal-style favicon featuring a command prompt symbol and hexagonal lemon icon in lime yellow-green</desc>
  
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0a0a0a" style="fill:rgb(10, 10, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Terminal window border -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#1a1a1a" stroke-width="1" style="fill:none;stroke:rgb(26, 26, 26);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Command prompt symbol ">" -->
  <path d="M 5 10 L 8 13 L 5 16" fill="none" stroke="#c4f05a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(196, 240, 90);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Hexagonal lemon - OUTER RING NOW YELLOW -->
  <path d="M 16 8 L 20 11 L 20 17 L 16 20 L 12 17 L 12 11 Z" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-linejoin="round" style="fill:none;stroke:rgb(255, 215, 0);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Inner hexagon detail -->
  <path d="M 16 10 L 18.5 12 L 18.5 16 L 16 18 L 13.5 16 L 13.5 12 Z" fill="none" stroke="#c4f05a" stroke-width="1" opacity="0.5" style="fill:none;stroke:rgb(196, 240, 90);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Leaf accent -->
  <path d="M 17 7 Q 19 6 20 8" fill="none" stroke="#c4f05a" stroke-width="1" stroke-linecap="round" style="fill:none;stroke:rgb(196, 240, 90);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Scan line effect -->
  <line x1="2" y1="14" x2="30" y2="14" stroke="#c4f05a" stroke-width="0.5" opacity="0.2" style="fill:rgb(0, 0, 0);stroke:rgb(196, 240, 90);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>